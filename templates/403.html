<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 — Accès refusé · OpenFood</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2.5rem;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
    }
    .logo {
      font-family: 'Syne', sans-serif; font-weight: 900; font-size: 1.05rem;
      letter-spacing: -0.02em; color: #0f172a; text-decoration: none;
    }
    .logo span { color: #f97316; }
    .chip {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em;
      padding: 0.3rem 0.8rem; border-radius: 999px;
      background: #fefce8; color: #a16207;
      border: 1px solid #fde68a;
    }

    .main {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 5rem 2rem;
      text-align: center;
    }

    .error-num {
      font-family: 'Syne', sans-serif; font-weight: 900;
      font-size: clamp(5rem, 15vw, 9rem);
      line-height: 1; letter-spacing: -0.05em;
      color: #0f172a;
      margin-bottom: 1.5rem;
    }

    .rule {
      width: 2.5rem; height: 3px; border-radius: 999px;
      background: #f97316;
      margin: 0 auto 1.75rem;
    }

    .title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(1.5rem, 3.5vw, 2.25rem);
      letter-spacing: -0.03em; line-height: 1.15;
      color: #0f172a; margin-bottom: 0.875rem;
    }

    .desc {
      font-size: 0.95rem; color: #64748b;
      max-width: 40ch; line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex; align-items: center; gap: 0.75rem;
      flex-wrap: wrap; justify-content: center;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.65rem 1.5rem;
      background: #f97316; color: #fff;
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.875rem;
      border-radius: 0.625rem; text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-primary:hover {
      background: #ea580c;
      box-shadow: 0 4px 16px rgba(249,115,22,0.3);
    }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.65rem 1.35rem; color: #64748b; font-size: 0.875rem;
      font-family: 'Outfit', sans-serif;
      text-decoration: none;
      border: 1.5px solid #e2e8f0; border-radius: 0.625rem;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .btn-ghost:hover { color: #0f172a; border-color: #cbd5e1; background: #fff; }

    .footer {
      padding: 1.125rem 2.5rem;
      background: #fff; border-top: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.72rem; color: #94a3b8;
    }

    @media (max-width: 480px) {
      .topbar, .footer { padding-left: 1.25rem; padding-right: 1.25rem; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="/" class="logo">Open<span>Food</span></a>
    <span class="chip">Accès refusé</span>
  </header>

  <main class="main">
    <div class="error-num">403</div>
    <div class="rule"></div>
    <h1 class="title">Accès non autorisé</h1>
    <p class="desc">
      Vous n'avez pas les permissions nécessaires
      pour accéder à cette page.
    </p>
    <div class="actions">
      <a href="/" class="btn-primary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M9 21V9h6v12"/></svg>
        Retour à l'accueil
      </a>
      <a href="javascript:history.back()" class="btn-ghost">← Page précédente</a>
    </div>
  </main>

  <footer class="footer">
    <span>HTTP 403 FORBIDDEN</span>
    <span>OpenFood · {% now "Y" %}</span>
  </footer>

</body>
</html>
