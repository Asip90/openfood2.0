{% load static %}
<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OpenFood{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}OpenFood — Menu digital QR Code pour restaurants en Afrique de l'Ouest.{% endblock %}">
  <meta property="og:title" content="{% block og_title %}OpenFood{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Créez votre menu digital QR Code en 5 minutes. Gratuit pour démarrer.{% endblock %}">
  {% if canonical_url %}<link rel="canonical" href="{{ canonical_url }}">{% endif %}

  <script src="{% static 'vendor/tailwind.js' %}"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#f97316', dark: '#ea580c', light: '#fff7ed' },
          },
          fontFamily: {
            display: ['Space Grotesk', 'system-ui', 'sans-serif'],
            
            sans: ['DM Sans', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow:  '0 0 0 3px rgba(249,115,22,0.15), 0 8px 32px rgba(249,115,22,0.25)',
            soft:  '0 2px 12px rgba(0,0,0,0.06)',
            card:  '0 8px 32px rgba(0,0,0,0.08)',
          },
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
  <link href="{% static 'vendor/remixicon.css' %}" rel="stylesheet">

  <style>
    /* Google Translate — hide toolbar */
    .goog-te-banner-frame,.goog-te-gadget{display:none!important}
    body{top:0!important}
    .goog-text-highlight{background:none!important;box-shadow:none!important}
    .font-display { font-family: 'Syne', system-ui, sans-serif; }

    .input-field {
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .input-field:focus {
      outline: none;
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .su   { animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) both; }
    .su-1 { animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) 0.07s both; }
    .su-2 { animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) 0.14s both; }
    .su-3 { animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) 0.21s both; }
    .su-4 { animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) 0.28s both; }
    .su-5 { animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) 0.35s both; }
    .su-6 { animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) 0.42s both; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body class="font-sans bg-white text-slate-900 antialiased h-full">

  <!-- Language toggle flottant -->
  <div class="fixed top-4 right-4 z-50 flex items-center gap-0.5 bg-white border border-slate-200 rounded-xl px-1.5 py-1 shadow-soft">
    <button onclick="setLang('fr')" class="px-2 py-1 rounded-lg text-sm hover:bg-slate-100 transition-colors" title="Français">🇫🇷</button>
    <button onclick="setLang('en')" class="px-2 py-1 rounded-lg text-sm hover:bg-slate-100 transition-colors" title="English">🇬🇧</button>
  </div>

  {% block content %}{% endblock %}
  {% block extra_js %}{% endblock %}

  <!-- Google Translate -->
  <div id="google_translate_element" style="position:absolute;top:-9999px"></div>
  <script>
    function googleTranslateElementInit(){
      new google.translate.TranslateElement({pageLanguage:'fr',autoDisplay:false},'google_translate_element');
      if(localStorage.getItem('of_lang')==='en') _gtApply('en');
    }
    function _gtApply(l){
      var s=document.querySelector('.goog-te-combo');
      if(s){s.value=l;s.dispatchEvent(new Event('change'));}
      else setTimeout(function(){_gtApply(l);},300);
    }
    function setLang(l){
      localStorage.setItem('of_lang',l);
      if(l==='fr'){
        var e=new Date(0).toUTCString();
        document.cookie='googtrans=;expires='+e+';path=/';
        document.cookie='googtrans=;expires='+e+';path=/;domain=.'+location.hostname;
        location.reload();
      } else { _gtApply(l); }
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
</body>
</html>
