<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Open Food — Menu Digital par QR Code{% endblock %}</title>
  {% block meta %}
  <meta name="description" content="{% block meta_description %}Créez votre menu digital QR Code en 5 minutes. Solution SaaS pour restaurateurs.{% endblock %}">
  <meta property="og:title" content="{% block og_title %}Open Food{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Menu digital QR Code pour restaurants{% endblock %}">
  <meta property="og:type" content="website">
  {% if canonical_url %}<link rel="canonical" href="{{ canonical_url }}">{% endif %}
  {% endblock %}
  {% block schema_org %}{% endblock %}

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#f97316', dark: '#ea580c', light: '#fff7ed' },
            secondary: { DEFAULT: '#ea580c' },
          },
          fontFamily: {
            display: ['Syne', 'system-ui', 'sans-serif'],
            sans: ['DM Sans', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            soft: '0 2px 12px rgba(0,0,0,0.06)',
            card: '0 8px 32px rgba(0,0,0,0.08)',
            phone: '0 40px 100px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05)',
            glow: '0 0 0 3px rgba(249,115,22,0.15), 0 8px 32px rgba(249,115,22,0.25)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'float-delay': 'float 6s ease-in-out 2s infinite',
            'marquee': 'marquee 28s linear infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-12px)' },
            },
            marquee: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            },
          },
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js"></script>

  <style>
    /* Scroll reveal */
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s cubic-bezier(.16,1,.3,1), transform 0.7s cubic-bezier(.16,1,.3,1); }
    .reveal.delay-1 { transition-delay: 0.1s; }
    .reveal.delay-2 { transition-delay: 0.2s; }
    .reveal.delay-3 { transition-delay: 0.3s; }
    .reveal.delay-4 { transition-delay: 0.4s; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    /* Font utility */
    .font-display { font-family: 'Syne', system-ui, sans-serif; }
    /* Hide scrollbar (testimonials swipe) */
    .scrollbar-none { scrollbar-width: none; -ms-overflow-style: none; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    /* iPhone safe area bottom */
    .safe-bottom { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body class="font-sans bg-white text-slate-900 antialiased">
  {% block navbar %}{% endblock %}
  <main id="main-content">{% block content %}{% endblock %}</main>
  {% block footer %}{% endblock %}

  <script>
    /* Scroll reveal observer */
    const ro = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => ro.observe(el));
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
