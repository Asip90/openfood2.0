{# Panier — contrôlé par cartOpen + cartItems dans le x-data parent #}
<div x-show="cartOpen"
     x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-end">

  <!-- Backdrop -->
  <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" @click="cartOpen = false"></div>

  <!-- Sheet -->
  <div class="relative bg-white w-full rounded-t-3xl z-10 flex flex-col max-h-[88vh] shadow-modal"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="translate-y-full"
       x-transition:enter-end="translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="translate-y-0"
       x-transition:leave-end="translate-y-full">

    <!-- Handle + Header -->
    <div class="flex-shrink-0 px-5 pt-2.5 pb-4">
      <div class="flex justify-center mb-3">
        <div class="w-9 h-1 rounded-full bg-slate-200"></div>
      </div>
      <div class="flex items-center justify-between">
        <div>
          <h2 class="font-black text-slate-900 text-lg leading-tight">Mon panier</h2>
          <p class="text-slate-400 text-xs mt-0.5"
             x-text="cartCount + ' article' + (cartCount > 1 ? 's' : '')"></p>
        </div>
        <button @click="cartOpen = false"
                class="w-9 h-9 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-500 active:bg-slate-200 transition-colors">
          <i class="ri-close-line text-base"></i>
        </button>
      </div>
    </div>

    <!-- Items (scrollable) -->
    <div class="flex-1 overflow-y-auto px-5 pb-2 space-y-2.5 scrollbar-none">

      <!-- Empty state -->
      <template x-if="cartItems.length === 0">
        <div class="flex flex-col items-center justify-center py-14 text-center">
          <div class="w-16 h-16 rounded-3xl bg-slate-50 flex items-center justify-center mb-4">
            <i class="ri-shopping-bag-line text-2xl text-slate-300"></i>
          </div>
          <p class="text-slate-600 text-sm font-semibold">Panier vide</p>
          <p class="text-slate-400 text-xs mt-1">Ajoutez des plats depuis le menu</p>
        </div>
      </template>

      <!-- Item rows -->
      <template x-for="item in cartItems" :key="item.id">
        <div class="flex items-center gap-3 rounded-2xl p-3"
             style="background: #f8fafc;">

          <!-- Image or fallback -->
          <template x-if="item.image">
            <img :src="item.image" :alt="item.name"
                 class="w-14 h-14 rounded-xl object-cover flex-shrink-0">
          </template>
          <template x-if="!item.image">
            <div class="w-14 h-14 rounded-xl bg-white border border-slate-100 flex items-center justify-center flex-shrink-0">
              <i class="ri-restaurant-line text-xl text-slate-200"></i>
            </div>
          </template>

          <!-- Info -->
          <div class="flex-1 min-w-0">
            <p class="text-slate-900 font-semibold text-sm leading-tight truncate" x-text="item.name"></p>
            <p class="text-sm font-bold mt-0.5" style="color: var(--color-primary);"
               x-text="(item.price * item.quantity).toLocaleString('fr-FR') + ' FCFA'"></p>
          </div>

          <!-- Quantity stepper -->
          <div class="flex items-center gap-1.5 flex-shrink-0">
            <button @click="updateQty(item.id, Number(item.quantity) - 1)"
                    class="w-7 h-7 rounded-lg bg-white border border-slate-200 flex items-center justify-center text-slate-500 active:bg-slate-100 transition-colors text-sm">
              <i class="ri-subtract-line"></i>
            </button>
            <span class="font-black text-slate-900 text-sm min-w-[1.2rem] text-center"
                  x-text="item.quantity"></span>
            <button @click="updateQty(item.id, Number(item.quantity) + 1)"
                    class="w-7 h-7 rounded-xl flex items-center justify-center text-white text-sm transition-colors active:opacity-80"
                    style="background-color: var(--color-primary);">
              <i class="ri-add-line"></i>
            </button>
          </div>

        </div>
      </template>

    </div>

    <!-- Footer -->
    <div class="flex-shrink-0 px-5 pt-3 pb-5 border-t border-slate-100">
      <!-- Total row -->
      <div class="flex items-center justify-between mb-3">
        <span class="text-slate-500 text-sm">Total</span>
        <span class="font-black text-slate-900 text-xl" x-text="formatPrice(cartTotal)"></span>
      </div>

      <!-- CTA -->
      <a :href="cartItems.length > 0 && CHECKOUT_URL ? CHECKOUT_URL : '#'"
         :class="cartItems.length === 0 || !CHECKOUT_URL ? 'opacity-40 pointer-events-none' : ''"
         class="flex items-center justify-between w-full py-4 px-5 rounded-2xl text-white font-bold text-sm transition-all active:scale-[.98] shadow-float"
         style="background-color: var(--color-primary);">
        <span>Commander</span>
        <span x-text="formatPrice(cartTotal)"></span>
      </a>
    </div>

  </div>
</div>
