{% comment %} customer/error.html {% endcomment %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops — OpenFood</title>
    {%% load static %%}
<script src="{% static 'vendor/tailwind.js' %}"></script>
    <link href="{% static 'vendor/remixicon.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Outfit', sans-serif; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .anim { animation: fadeUp .45s cubic-bezier(.25,.46,.45,.94) both; }
      .s1 { animation-delay: .1s; }
      .s2 { animation-delay: .2s; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xs w-full text-center">
        <div class="w-20 h-20 mx-auto mb-6 rounded-3xl bg-red-100 flex items-center justify-center anim">
            <i class="ri-error-warning-line text-red-500 text-3xl"></i>
        </div>
        <h1 class="text-2xl font-black text-slate-900 mb-3 anim s1">Oups !</h1>
        <p class="text-slate-500 text-sm leading-relaxed mb-8 anim s1">{{ message }}</p>
        <a href="/"
           class="inline-flex items-center gap-2 px-6 py-3.5 bg-slate-900 text-white text-sm font-bold rounded-2xl transition-all active:scale-95 anim s2">
            <i class="ri-arrow-left-line"></i> Retour à l'accueil
        </a>
    </div>
</body>
</html>
