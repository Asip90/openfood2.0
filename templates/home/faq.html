<!-- FAQ Section — Schema FAQPage pour AI SEO (ChatGPT, Perplexity, Google AI Overviews) -->
<section class="bg-slate-50 py-20" id="faq">
  <div class="max-w-3xl mx-auto px-6">

    <div class="text-center mb-12">
      <span class="text-primary font-bold text-sm uppercase tracking-wider">FAQ</span>
      <h2 class="text-3xl font-extrabold text-slate-900 mt-3">Questions fréquentes</h2>
      <p class="text-slate-500 mt-2 text-lg">Tout ce que vous devez savoir sur Open Food</p>
    </div>

    <div class="space-y-3" x-data="{ open: null }">
      {% for faq in faqs %}
      <div class="bg-white rounded-2xl shadow-soft border border-slate-100 overflow-hidden"
           itemscope itemprop="mainEntity" itemtype="https://schema.org/Question">

        <button class="w-full flex items-center justify-between px-6 py-5 text-left font-semibold text-slate-900 hover:bg-slate-50 transition-colors"
                @click="open = open === {{ forloop.counter }} ? null : {{ forloop.counter }}"
                :aria-expanded="open === {{ forloop.counter }}">
          <span itemprop="name">{{ faq.question }}</span>
          <i class="ri-arrow-down-s-line text-xl text-slate-400 flex-shrink-0 ml-3 transition-transform duration-200"
             :class="{ 'rotate-180': open === {{ forloop.counter }} }"></i>
        </button>

        <div x-show="open === {{ forloop.counter }}"
             x-cloak
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-1"
             x-transition:enter-end="opacity-100 translate-y-0"
             class="px-6 pb-5"
             itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
          <p class="text-slate-600 leading-relaxed" itemprop="text">{{ faq.answer }}</p>
        </div>
      </div>
      {% empty %}
      <!-- FAQs non disponibles -->
      {% endfor %}
    </div>

  </div>
</section>
